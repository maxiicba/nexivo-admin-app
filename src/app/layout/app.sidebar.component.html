<!-- Perfil card arriba -->
<div class="sidebar-profile">
    <div class="sidebar-profile__avatar" aria-hidden="true">{{ userInitial }}</div>
    <div class="sidebar-profile__info">
        <span class="sidebar-profile__name">{{ userName }}</span>
        <span class="sidebar-profile__email">{{ userEmail }}</span>
    </div>
    <button class="sidebar-profile__collapse" (click)="toggleCollapse()" type="button"
            pTooltip="Colapsar" tooltipPosition="right" [tooltipDisabled]="!isCollapsed" aria-label="Colapsar">
        <i class="pi pi-angle-left"></i>
    </button>
</div>

<div class="sidebar-divider"></div>

<div class="sidebar-content">
    <app-menu></app-menu>
</div>

<!-- Footer estado -->
<div class="sidebar-footer">
    <span class="sidebar-footer__dot" [class.is-down]="!operational"></span>
    <span class="sidebar-footer__label">{{ operational ? 'Operativo' : 'Caído' }}</span>
    <span class="sidebar-footer__dot-sep">·</span>
    <span class="sidebar-footer__version">{{ appVersion }}</span>
</div>
